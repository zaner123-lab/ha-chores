<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}Chores{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/app.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand__mark">✦</span>
      <span class="brand__name">Chores</span>
    </div>
    <nav class="tabs">
      <a href="./" class="tab {% if active_tab == 'today' %}is-active{% endif %}">Today</a>
      <a href="admin" class="tab {% if active_tab == 'admin' %}is-active{% endif %}">Admin</a>
    </nav>
  </header>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <script src="static/app.js"></script>
</body>
</html>
