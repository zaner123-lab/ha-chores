# Example automations using entities exposed by the Household Chores add-on.
# Replace `<kidname>` with the slugified kid name (lowercase, alnum, underscores
# in place of other chars). E.g. user "Sam" -> entity suffix `sam`.

# 1. Announce when a kid earns their allowance for the day.
- alias: Chores - Allowance earned announcement
  trigger:
    - platform: state
      entity_id: binary_sensor.chores_sam_allowance_earned
      to: "on"
  condition:
    # Only between 8am and 9pm so we don't wake anyone up
    - condition: time
      after: "08:00:00"
      before: "21:00:00"
  action:
    - service: tts.cloud_say
      data:
        entity_id: media_player.living_room_speaker
        message: "Sam, you earned your allowance today! Nice work."

# 2. Dinner-time reminder if any kid still has chores remaining.
- alias: Chores - Pre-dinner reminder
  trigger:
    - platform: time
      at: "17:30:00"
  condition:
    - condition: numeric_state
      entity_id: sensor.chores_sam_remaining
      above: 0
  action:
    - service: notify.mobile_app_zane_phone
      data:
        title: "Sam still has chores"
        message: >
          {{ states('sensor.chores_sam_remaining') }} chore(s) left for Sam today.

# 3. Weekly summary every Sunday night
- alias: Chores - Weekly summary
  trigger:
    - platform: time
      at: "19:00:00"
  condition:
    - condition: time
      weekday:
        - sun
  action:
    - service: notify.family
      data:
        title: "This week's chore stars"
        message: >
          Sam earned {{ states('sensor.chores_sam_effort_today') }} effort points today.

# 4. Open chores motivator: if 3+ open chores still up for grabs by 4pm,
#    flash the kitchen lights gently.
- alias: Chores - Open chores nudge
  trigger:
    - platform: time
      at: "16:00:00"
  condition:
    - condition: numeric_state
      entity_id: sensor.chores_open_remaining
      above: 2
  action:
    - service: light.turn_on
      target:
        entity_id: light.kitchen
      data:
        brightness_pct: 100
        color_name: orange
    - delay: "00:00:02"
    - service: light.turn_on
      target:
        entity_id: light.kitchen
      data:
        brightness_pct: 60
        kelvin: 3000
